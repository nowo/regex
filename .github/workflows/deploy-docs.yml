name: Deploy Playground

on:
  push:
    branches: [main]
    paths:
      - 'packages/playground/**'
      - 'packages/core/**'
      - .github/workflows/deploy-docs.yml
  workflow_dispatch:

# GitHub Pages 部署所需权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同时只跑一个部署，不打断进行中的（保证页面发布完整）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      # Node 24: @nuxt/content 用 node:sqlite (nativeSqlite)，22 下仍是实验特性
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      # trustPolicy: no-downgrade 会拦 @types/node 链路，CI 用 flag 绕过，与本地一致
      - name: Install
        run: pnpm install --frozen-lockfile --config.trustPolicy=disabled

      # playground 消费库的 dist，必须先构建库
      - name: Build library
        run: pnpm --filter @wzo/regex-diagram build

      - name: Generate static site
        run: pnpm --filter playground build
        env:
          # Project page 部署在 /<仓库名>/ 子路径；将来换自定义域名时改成 /
          NUXT_APP_BASE_URL: /${{ github.event.repository.name }}/

      # 防止 GitHub Pages 的 Jekyll 忽略 _nuxt 目录
      - name: Add .nojekyll
        run: touch packages/playground/.output/public/.nojekyll

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: packages/playground/.output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
